services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,dynamodb
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./infra/localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  plate-blurring:
    build:
      context: services/plate-blurring
    ports:
      - "8001:8001"
    environment:
      PLATE_MODEL_PATH: /app/models/plate_model.pt
      PLATE_CONFIDENCE: "0.45"
      BLUR_KERNEL_SIZE: "51"
      PORT: "8001"
    volumes:
      - ./models/plate-blurring:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      localstack:
        condition: service_healthy

  pipeline:
    build:
      context: services/pipeline
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET: damage-detection-local
      SQS_INPUT_QUEUE_URL: http://localstack:4566/000000000000/damage-detection-input
      SQS_EVENTS_QUEUE_URL: http://localstack:4566/000000000000/damage-detection-events
      DYNAMODB_TABLE: damage-detection-jobs
      PLATE_BLURRING_URL: http://plate-blurring:8001
      FRAME_EXTRACTION_FPS: "1.0"
      DAMAGE_MODEL_PATH: /app/models/damage_model.pt
      DAMAGE_CONFIDENCE: "0.45"
    volumes:
      - ./models/pipeline:/app/models
    depends_on:
      localstack:
        condition: service_healthy
      plate-blurring:
        condition: service_healthy

volumes:
  localstack-data:
